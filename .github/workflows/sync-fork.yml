name: Sync Fork

on:
  schedule:
    - cron: "10 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-m3u:
    runs-on: ubuntu-latest
    steps: # 👈 1. 这里已经严格和 runs-on 对齐，彻底解决 image.png 中的 Invalid workflow file 语法错误
      - name: Download latest playlist
        run: |
          curl -L \
          https://raw.githubusercontent.com/xiaotan8/xiaotan8.github.io/main/mytvsuper.m3u \
          -o mytvsuper.m3u

      - name: Fix logo URLs
        run: |
          # 2. 修复了第二条替换规则：原脚本写成了 s|...|g，中间漏掉了替换后的目标链接。
          # 现在已补全为：把作者的两个前缀全部统一清洗为 epg.yang-1989.eu.org
          sed -i 's|https://php.946985.xyz/logo/|https://epg.yang-1989.eu.org/logo/|g' mytvsuper.m3u
          sed -i 's|https://xiaotan.860775.xyz/|https://epg.yang-1989.eu.org/logo/|g' mytvsuper.m3u

      - name: Remove failed request logs
        run: |
          grep -v '请求失败:' mytvsuper.m3u > tmp.m3u && mv tmp.m3u mytvsuper.m3u

      - name: Validate output
        run: |
          echo "lines: $(wc -l < mytvsuper.m3u)"
          echo "failed lines: $(grep -c '请求失败:' mytvsuper.m3u || true)"

            - name: Push to Repository Local
        run: |
          # 1. 配置 Actions 机器人身份
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # 2. 直接添加刚刚洗好的 mytvsuper.m3u 文件
          git add mytvsuper.m3u
          
          # 3. 检查是否有变动，如果有，直接推送到当前仓库
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto update mytvsuper.m3u $(date '+%Y-%m-%d %H:%M')"
            git push origin main
            echo "✅ 成功在本地更新并推送 mytvsuper.m3u"
          fi
