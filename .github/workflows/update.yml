name: Auto Merge and Fix IPTV M3U

on:
  schedule:
    # 每天 UTC 20:00 运行（对应北京时间凌晨 04:00）
    - cron: '0 20 * * *'
  workflow_dispatch: # 支持手动点击按钮触发

permissions:
  contents: write # 给予 Action 推送代码进仓库的权限

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Run Merge and Clean Script
      run: |
        python update_m3u.py

    - name: Commit and Push changes
      run: |
        git config --local user.email "actions@github.com"
        git config --local user.name "GitHub Actions"

        # 使用 git add . 把新生成的 .m3u 和 logos 文件夹全加进来
        git add .

        # 只有在有文件变动时才提交，防止没有更新时报错导致 Action 变红
        git commit -m "Auto Update M3U and backup logos" || echo "No changes to commit"
        git push
